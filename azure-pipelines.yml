# Deploy to Azure Kubernetes Service
# Build and push image to Azure Container Registry; Deploy to Azure Kubernetes Service
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- main

resources:
- repo: self

variables:

  # Container registry service connection established during pipeline creation
  dockerRegistryServiceConnection: '8b68c153-7e8a-49a3-bca1-47dc90556efc'
  imageRepository: 'manmohanbatrapipelinesjavascriptdocker'
  containerRegistry: 'mycontainerregistry2000.azurecr.io'
  dockerfilePath: '**/Dockerfile'
  tag: '$(Build.BuildId)'
  imagePullSecret: 'mycontainerregistry20008693a6d2-auth'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'


stages:
- stage: Build
  displayName: Build stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)

    - upload: manifests
      artifact: manifests

- stage: Deploy
  displayName: Deploy stage
  dependsOn: Build

  jobs:
  - deployment: Deploy
    displayName: Deploy
    pool:
      vmImage: $(vmImageName)
    environment: 'manmohanbatrapipelinesjavascriptdocker-1476.javascript-app'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: KubernetesManifest@0
            displayName: Create imagePullSecret
            inputs:
              action: createSecret
              secretName: $(imagePullSecret)
              dockerRegistryEndpoint: $(dockerRegistryServiceConnection)
              namespace: javascript-app

#          - task: KubernetesManifest@0
#            displayName: Deploy to Kubernetes cluster
#            inputs:
#              action: deploy
#             manifests: |
#               $(Pipeline.Workspace)/manifests/deployment.yml
#               $(Pipeline.Workspace)/manifests/service.yml
#             imagePullSecrets: |
#               $(imagePullSecret)
#             containers: |
#               $(containerRegistry)/$(imageRepository):$(tag)
#             namespace: javascript-app
          - task: KubernetesManifest@1
            displayName: Deploy
            inputs:
              kubernetesServiceConnection: myAKSapp-javascript-app
              namespace: javascript-app
              manifests: |
                $(Pipeline.Workspace)/manifests/deployment.yml
                $(Pipeline.Workspace)/manifests/service.yml
              containers: |
                $(containerRegistry)/$(imageRepository):$(tag)
              imagePullSecrets: |
                mycontainerregistry20008693a6d2-auth
